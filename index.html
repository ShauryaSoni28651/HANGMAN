<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangman</title>

  <!-- Distinctive fonts: Playfair Display (brand), Courier Prime (word), EB Garamond (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Courier+Prime:wght@400;700&family=EB+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Atmospheric glow orbs -->
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="brand">
      <svg class="brand-glyph" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="4"  y1="34" x2="24" y2="34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="8"  y1="34" x2="8"  y2="4"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="8"  y1="4"  x2="20" y2="4"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="4"  x2="20" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="8"  y1="10" x2="14" y2="4"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="20" cy="17" r="6" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="brand-text">HANGMAN</span>
    </div>
    <div class="nav-actions">
      <!-- Load CSV button -->
      <label class="btn btn-ghost" for="csvFileInput" title="Load a custom words.csv file">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Load CSV
      </label>
      <input type="file" id="csvFileInput" accept=".csv" style="display:none" aria-label="Upload CSV word list" />
      <button class="btn btn-primary" id="newGameBtn">New Game</button>
    </div>
  </nav>

  <!-- ── Main game layout ── -->
  <main class="game-layout">

    <!-- Left panel: gallows SVG + stats -->
    <aside class="gallows-panel">
      <div class="gallows-frame">
        <svg class="hangman-svg" viewBox="0 0 220 290" xmlns="http://www.w3.org/2000/svg" fill="none" aria-label="Hangman figure">

          <!-- Gallows structure — always visible -->
          <g class="gallows-structure">
            <!-- Base  -->   <line x1="12"  y1="278" x2="190" y2="278"/>
            <!-- Pole  -->   <line x1="58"  y1="278" x2="58"  y2="16"/>
            <!-- Beam  -->   <line x1="58"  y1="16"  x2="152" y2="16"/>
            <!-- Rope  -->   <line x1="152" y1="16"  x2="152" y2="48"/>
            <!-- Strut -->   <line x1="58"  y1="46"  x2="98"  y2="16"/>
          </g>

          <!-- ── Body parts (hidden until wrong guess) ── -->

          <!-- 1. Head (circle) -->
          <circle id="part-head"  class="body-part" cx="152" cy="69" r="21"/>

          <!-- 2. Torso -->
          <line   id="part-torso" class="body-part" x1="152" y1="90"  x2="152" y2="168"/>

          <!-- 3. Left arm -->
          <line   id="part-arm-l" class="body-part" x1="152" y1="112" x2="120" y2="146"/>

          <!-- 4. Right arm -->
          <line   id="part-arm-r" class="body-part" x1="152" y1="112" x2="184" y2="146"/>

          <!-- 5. Left leg -->
          <line   id="part-leg-l" class="body-part" x1="152" y1="168" x2="120" y2="218"/>

          <!-- 6. Right leg -->
          <line   id="part-leg-r" class="body-part" x1="152" y1="168" x2="184" y2="218"/>

          <!-- Death face overlay (shown only on loss) -->
          <g id="part-face" class="body-part death-face">
            <!-- × left eye -->
            <line x1="143" y1="61" x2="149" y2="67"/>
            <line x1="149" y1="61" x2="143" y2="67"/>
            <!-- × right eye -->
            <line x1="157" y1="61" x2="163" y2="67"/>
            <line x1="163" y1="61" x2="157" y2="67"/>
            <!-- sad mouth -->
            <path d="M143 78 Q152 72 161 78"/>
          </g>
        </svg>
      </div>

      <!-- Wrong-tries left pips -->
      <div class="tries-block">
        <div class="stat-label">WRONG TRIES LEFT</div>
        <div class="tries-pips" id="triesPips"></div>
      </div>

      <!-- Wrong letters list -->
      <div class="wrong-block">
        <div class="stat-label">WRONG LETTERS</div>
        <div class="wrong-list" id="wrongList">—</div>
      </div>
    </aside>

    <!-- Right panel: hint, word, keyboard -->
    <section class="word-panel">

      <!-- Hint -->
      <div class="hint-row">
        <span class="hint-badge">HINT</span>
        <p class="hint-text" id="hintText">Loading…</p>
      </div>

      <!-- Word blanks / revealed letters -->
      <div class="word-display" id="wordDisplay" aria-live="polite" aria-label="Current word"></div>

      <!-- On-screen keyboard (A–Z) -->
      <div class="keyboard" id="keyboard" role="group" aria-label="Letter buttons"></div>

      <!-- Brief status message after each guess -->
      <p class="status-msg" id="statusMsg" aria-live="assertive" aria-atomic="true"></p>

    </section>
  </main>

  <!-- ── Win / Loss Modal ── -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box" id="modalBox">
      <div class="modal-icon"  id="modalIcon"></div>
      <h2  class="modal-title" id="modalTitle"></h2>
      <p   class="modal-desc"  id="modalDesc"></p>
      <!-- Colour-coded letter reveal -->
      <div class="modal-word"  id="modalWord"></div>
      <button class="btn btn-primary btn-lg" id="modalPlayAgain">Play Again</button>
    </div>
  </div>

  <!-- Toast notifications (CSV load feedback) -->
  <div id="toastContainer" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
